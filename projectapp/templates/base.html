{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Demo Site{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <script>
      // Apply theme immediately to prevent light flash
      if (localStorage.getItem('theme') === 'dark') {
          document.body.classList.add('dark-mode');
      }
    </script>
    <header class="site-header">
      <div class="brand">
        <img
          src="{% static 'images/logo.png' %}"
          alt="Keltron Medical Center Logo"
          class="brand-logo"
        />
        <div>
          <p class="eyebrow">Emergency Call: +91 471 2724222</p>
          <h1>Keltron Medical Center</h1>
        </div>
      </div>

      <nav class="site-nav" aria-label="Primary">
        <a href="/app/home">Home</a>
        <a href="/app/about">About</a>
        <a href="/app/details">Details</a>
        <a href="/app/departments">Departments</a>
        <a href="/app/doctors">Doctors</a>
        <a href="/app/booking">Book Appointment</a>
        <a href="/app/bookings">Appointments</a>
        <button id="themeToggle" class="btn-secondary" style="padding: 4px 10px; font-size: 0.8rem; cursor: pointer; margin-left: 8px;">🌙 Dark Mode</button>
      </nav>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <img
        src="{% static 'images/logo.png' %}"
        alt="Footer logo"
        class="footer-image"
      />
      <p>keltron.</p>
      <div class="footer-links">
        <a href="/app/home">Home</a>
        <a href="/app/about">About</a>
        <a href="/app/details">Details</a>
        <a href="/app/departments">Departments</a>
        <a href="/app/doctors">Doctors</a>
        <a href="/app/booking">Book Appointment</a>
        <a href="/app/bookings">Appointments</a>
      </div>
    </footer>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
          const toggleBtn = document.getElementById('themeToggle');
          
          // Update button label depending on current active theme
          if (document.body.classList.contains('dark-mode')) {
              toggleBtn.textContent = '☀️ Light Mode';
          } else {
              toggleBtn.textContent = '🌙 Dark Mode';
          }
      
          toggleBtn.addEventListener('click', () => {
              document.body.classList.toggle('dark-mode');
              if (document.body.classList.contains('dark-mode')) {
                  localStorage.setItem('theme', 'dark');
                  toggleBtn.textContent = '☀️ Light Mode';
              } else {
                  localStorage.setItem('theme', 'light');
                  toggleBtn.textContent = '🌙 Dark Mode';
              }
          });
      });
    </script>
  </body>
</html>
